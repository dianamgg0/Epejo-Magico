<script>
  function createSparkles() {
    for (let i = 0; i < 20; i++) {
      const sparkle = document.createElement("div");
      sparkle.className = "sparkle";
      sparkle.style.left = Math.random() * window.innerWidth + "px";
      sparkle.style.top = (300 + Math.random() * 400) + "px";
      sparkle.style.animationDuration = (3 + Math.random() * 3) + "s";
      document.body.appendChild(sparkle);
      setTimeout(() => sparkle.remove(), 6000);
    }
  }
  setInterval(createSparkles, 1000);

  document.getElementById('imageUpload').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(event) {
        document.getElementById('uploadedImage').src = event.target.result;
        document.getElementById('magicText').style.display = 'block';
        document.getElementById('downloadBtn').style.display = 'inline-block';
      };
      reader.readAsDataURL(file);
    }
  });

  document.getElementById('downloadBtn').addEventListener('click', function() {
    const frame = document.querySelector('.mirror-frame');

    // 🔥 Alta resolución
    const scale = 2;
    const canvas = document.createElement('canvas');
    canvas.width = frame.offsetWidth * scale;
    canvas.height = frame.offsetHeight * scale;

    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);

    const frameImg = new Image();
    frameImg.src = "Espejo.png";

    frameImg.onload = () => {
      ctx.drawImage(frameImg, 0, 0, frame.offsetWidth, frame.offsetHeight);

      const userImg = new Image();
      userImg.src = document.getElementById('uploadedImage').src;

      userImg.onload = () => {

        ctx.save();

        // 🔥 MISMO ÓVALO QUE CSS
        const x = frame.offsetWidth * 0.10;
        const y = frame.offsetHeight * 0.15;
        const w = frame.offsetWidth * 0.70;
        const h = frame.offsetHeight * 0.70;

        ctx.beginPath();
        ctx.ellipse(
          x + w / 2,
          y + h / 2,
          w / 2,
          h / 2,
          0, 0, Math.PI * 2
        );
        ctx.clip();

        // 🔥 Imagen perfectamente encajada
        ctx.drawImage(userImg, x, y, w, h);

        ctx.restore();

        // Texto
        ctx.fillStyle = "gold";
        ctx.font = "30px 'Great Vibes', cursive";
        ctx.textAlign = "center";
        ctx.shadowColor = "rgba(255,215,0,0.8)";
        ctx.shadowBlur = 10;
        ctx.fillText("✨ Tu reflejo revela tu divinidad ✨", frame.offsetWidth/2, frame.offsetHeight - 20);

        // Descargar
        const link = document.createElement('a');
        link.download = "mi-revelacion.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      };
    };
  });
</script>
